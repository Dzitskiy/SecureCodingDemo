services:
  securecodingdemo:
    build:
      context: .
      dockerfile: src/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=securecodingdemo;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      Jwt__Issuer: SecureCodingDemo
      Jwt__Audience: SecureCodingDemoClient
      Jwt__SigningKey: dev-only-demo-signing-key-change-me
    ports:
      - "8080:8080"
